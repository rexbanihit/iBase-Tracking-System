      /* shared table kit: hover + selected-row highlight */
      .ibt table tbody tr:hover td { background: rgba(56,189,248,.07); }
      .ibt tr.ibt-sel td, table.ibt tr.ibt-sel td { background: rgba(56,189,248,.16) !important; }
      table.ibt tbody tr:hover td { background: rgba(56,189,248,.07); }
  .ibrow { cursor: pointer; }
  .ibrow:hover { background: rgba(56,189,248,.07) !important; }
  /* One password toggle everywhere: suppress Edge's built-in reveal (and IE's clear) */
  input::-ms-reveal, input::-ms-clear { display: none; }
  /* ═══ Tab-switch animations (v98) ═══ */
  @media (prefers-reduced-motion: no-preference) {
    .anim-bounce { animation: ibase-tab-in .3s cubic-bezier(.2,.8,.25,1); }
    .anim-bubble { animation: ibase-anim-bubble .38s cubic-bezier(.34,1.56,.64,1); }
    .anim-zoom   { animation: ibase-anim-zoom .28s cubic-bezier(.2,.8,.25,1); }
    .anim-slide  { animation: ibase-anim-slide .3s cubic-bezier(.2,.8,.25,1); }
    .anim-fade   { animation: ibase-anim-fade .32s ease; }
    .anim-flip   { animation: ibase-anim-flip .4s cubic-bezier(.2,.8,.25,1); transform-origin: 50% 0; }
    .anim-drop   { animation: ibase-anim-drop .42s cubic-bezier(.2,.8,.25,1); }
    .anim-swing  { animation: ibase-anim-swing .45s cubic-bezier(.2,.8,.25,1); transform-origin: 20% 0; }
    .anim-blur   { animation: ibase-anim-blur .34s ease; }
    .anim-wipe   { animation: ibase-anim-wipe .38s cubic-bezier(.2,.8,.25,1); }
    .anim-spin    { animation: ibase-anim-spin .38s cubic-bezier(.2,.8,.25,1); }
    .anim-elastic { animation: ibase-anim-elastic .55s cubic-bezier(.2,.8,.25,1); }
    .anim-rise    { animation: ibase-anim-rise .32s cubic-bezier(.2,.8,.25,1); }
    .anim-skew    { animation: ibase-anim-skew .34s cubic-bezier(.2,.8,.25,1); }
    .anim-glow    { animation: ibase-anim-glow .45s ease; }
    .anim-drop      { animation: ibase-anim-drop .55s cubic-bezier(.3,1.4,.4,1); }
    @keyframes ibase-anim-drop { 0% { opacity:0; transform: translateY(-46px); } 62% { transform: translateY(0) scaleY(.94) scaleX(1.03); } 100% { opacity:1; transform: none; } }
    .anim-swing     { animation: ibase-anim-swing .6s ease-out; transform-origin: top center; }
    @keyframes ibase-anim-swing { 0% { opacity:0; transform: rotate(-7deg); } 45% { transform: rotate(3.5deg); } 75% { transform: rotate(-1.5deg); } 100% { opacity:1; transform: none; } }
    .anim-elastic   { animation: ibase-anim-elastic .6s cubic-bezier(.2,1.6,.35,1); }
    @keyframes ibase-anim-elastic { 0% { opacity:0; transform: scaleX(.55); } 60% { transform: scaleX(1.06); } 100% { opacity:1; transform: none; } }
    .anim-blur      { animation: ibase-anim-blur .5s ease-out; }
    @keyframes ibase-anim-blur { from { opacity:0; filter: blur(9px); } to { opacity:1; filter: blur(0); } }
    .anim-curtain   { animation: ibase-anim-curtain .5s cubic-bezier(.2,.8,.25,1); transform-origin: top center; }
    @keyframes ibase-anim-curtain { from { opacity:0; transform: scaleY(.04); } to { opacity:1; transform: none; } }
    .anim-sweep     { animation: ibase-anim-sweep .5s cubic-bezier(.2,.8,.25,1); }
    @keyframes ibase-anim-sweep { from { opacity:0; transform: translate(-26px,14px) skewX(-8deg); } to { opacity:1; transform: none; } }
    .anim-spiral    { animation: ibase-anim-spiral .55s cubic-bezier(.2,.8,.25,1); }
    @keyframes ibase-anim-spiral { from { opacity:0; transform: rotate(-160deg) scale(.35); } to { opacity:1; transform: none; } }
    .anim-newspaper { animation: ibase-anim-newspaper .6s cubic-bezier(.2,.8,.25,1); }
    @keyframes ibase-anim-newspaper { from { opacity:0; transform: rotate(540deg) scale(.05); } to { opacity:1; transform: none; } }
    .anim-stretch   { animation: ibase-anim-stretch .5s cubic-bezier(.2,.9,.3,1); }
    @keyframes ibase-anim-stretch { from { opacity:0; transform: scaleY(.06) scaleX(1.15); } to { opacity:1; transform: none; } }
    .anim-glitch    { animation: ibase-anim-glitch .45s steps(1,end); }
    @keyframes ibase-anim-glitch { 0% { opacity:0; transform: translate(-7px,3px); } 20% { opacity:1; transform: translate(5px,-4px); } 40% { transform: translate(-4px,2px); } 60% { transform: translate(3px,3px); } 80% { transform: translate(-2px,-2px); } 100% { transform: none; } }
    .anim-fold    { animation: ibase-anim-fold .5s cubic-bezier(.2,.8,.25,1); transform-origin: top center; }
