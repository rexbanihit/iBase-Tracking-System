<script>
/* iBase computation engines - extracted VERBATIM from iBase v127:
   OT engine (weekly schedule, grace, holidays, cutoffs), inventory effective
   status + Brand-New/Used derivation, In/Out-history precedence, analytics
   exclusions. Behavior identical to the Google-Sheets edition. */
const OT_MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function otHoursBetween(a, b) { return Math.max(0, (b.getTime() - a.getTime()) / 3600000); }

function otParseDT(s) {
  if (!s) return null;
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function otRound2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

const DEFAULT_OT_SCHEDULE = {
  mon: { off: false, start: "08:00", end: "17:30" },
  tue: { off: false, start: "08:00", end: "17:30" },
  wed: { off: false, start: "08:00", end: "17:30" },
  thu: { off: false, start: "08:00", end: "17:30" },
  fri: { off: false, start: "08:00", end: "17:30" },
  sat: { off: false, start: "08:00", end: "12:00" },
  sun: { off: true,  start: "08:00", end: "12:00" },
};

const OT_DAY_LABELS = { mon: "Monday", tue: "Tuesday", wed: "Wednesday", thu: "Thursday", fri: "Friday", sat: "Saturday", sun: "Sunday" };

const DEFAULT_OT_SETTINGS = { schedule: DEFAULT_OT_SCHEDULE, graceMinutes: 60, cutoff1: 10, cutoff2: 25 };

var PULLOUT_VISIT_STATUSES = ["pulled-out", "pulled out", "instrument is ready for pull-out", "scrapped", "decommissioned"];

const OT_DAY_KEYS = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];   // getUTCDay() order


const NON_ANALYTICS_VISIT_TYPES = ["travel", "office repair", "documentation", "pro-active visit", "site survey", "phone support", "offset", "vacation leave", "sick leave", "weekly visit", "emergency leave", "not applicable"];

const PH_HOLIDAYS_2026 = [
  { date: "2026-01-01", name: "New Year's Day",            type: "Regular Holiday" },
  { date: "2026-02-17", name: "Chinese New Year",          type: "Special Non-Working Holiday" },
  { date: "2026-04-02", name: "Maundy Thursday",           type: "Regular Holiday" },
  { date: "2026-04-03", name: "Good Friday",               type: "Regular Holiday" },
  { date: "2026-04-04", name: "Black Saturday",            type: "Special Non-Working Holiday" },
  { date: "2026-04-09", name: "Araw ng Kagitingan",        type: "Regular Holiday" },
  { date: "2026-05-01", name: "Labor Day",                 type: "Regular Holiday" },
  { date: "2026-06-12", name: "Independence Day",          type: "Regular Holiday" },
  { date: "2026-08-21", name: "Ninoy Aquino Day",          type: "Special Non-Working Holiday" },
  { date: "2026-08-31", name: "National Heroes Day",       type: "Regular Holiday" },
  { date: "2026-11-01", name: "All Saints' Day",           type: "Special Non-Working Holiday" },
  { date: "2026-11-30", name: "Bonifacio Day",             type: "Regular Holiday" },
  { date: "2026-12-08", name: "Feast of the Immaculate Conception", type: "Special Non-Working Holiday" },
  { date: "2026-12-25", name: "Christmas Day",             type: "Regular Holiday" },
  { date: "2026-12-30", name: "Rizal Day",                 type: "Regular Holiday" },
  { date: "2026-12-31", name: "Last Day of the Year",      type: "Special Non-Working Holiday" },
];

const HOLIDAY_TYPES = ["Regular Holiday", "Special Non-Working Holiday", "Special Working Holiday", "Company Holiday"];

const ENGINEER_ROLES = [
  "Field Service Engineer",
  "Senior Field Service Engineer",
  "Application Specialist",
  "Senior Application Specialist",
  "CAS Supervisor",
  "TAS Coordinator",
  "Area Service Manager",
  "Technical Head",
  "Supervisor",
  "Trainee",
  "HR",
  "Accounting",
  "Warehouse Staff",
  "Driver",
  "Office Staff",
];

const INVENTORY_STATUS_OPTIONS = ["Available", "Not available", "Reserved", "For Installation", "Sold"];

function otNormSchedule(settings) {
  var src = (settings && settings.schedule && typeof settings.schedule === "object") ? settings.schedule : null;
  var legacyStart = (settings && settings.officeStart) || "08:00";
  var legacyEnd   = (settings && settings.officeEnd)   || "17:30";
  var out = {};
  OT_DAY_KEYS.forEach(function (k) {
    var d = (src && src[k]) || null;
    var def = DEFAULT_OT_SCHEDULE[k];
    if (d) out[k] = { off: !!d.off, start: d.start || def.start, end: d.end || def.end };
    else if (src) out[k] = { off: def.off, start: def.start, end: def.end };
    else out[k] = (k === "sat" || k === "sun") ? { off: def.off, start: def.start, end: def.end }
                                               : { off: false, start: legacyStart, end: legacyEnd };
  });
  var grace = Number(settings && settings.graceMinutes);
  if (!isFinite(grace) || grace < 0) grace = 60;
  return { schedule: out, graceMinutes: Math.min(600, Math.round(grace)) };
}

function otNormCutoffs(settings) {
  var c1 = Math.min(27, Math.max(1, Number(settings && settings.cutoff1) || 10));
  var c2 = Math.min(28, Math.max(c1 + 1, Number(settings && settings.cutoff2) || 25));
  return { c1: c1, c2: c2 };
}

function otWeekday(dateKey) {
  var p = String(dateKey).split("-").map(Number);
  return new Date(Date.UTC(p[0], p[1] - 1, p[2])).getUTCDay();
}

function otCutoffForDate(dateKey, settings) {
  var cc = otNormCutoffs(settings), c1 = cc.c1, c2 = cc.c2;
  var parts = String(dateKey).split("-").map(Number);
  var y = parts[0], m = parts[1] - 1, day = parts[2];
  function shortMon(mm) { return OT_MONTH_NAMES[mm].slice(0, 3); }
  var endY, endM, endD, startY, startM, startD, half;
  if (day <= c1)      { endY = y; endM = m; endD = c1; half = "A"; startY = y; startM = m - 1; if (startM < 0) { startM = 11; startY = y - 1; } startD = c2 + 1; }
  else if (day <= c2) { endY = y; endM = m; endD = c2; half = "B"; startY = y; startM = m; startD = c1 + 1; }
  else                { endY = y; endM = m + 1; if (endM > 11) { endM = 0; endY = y + 1; } endD = c1; half = "A"; startY = y; startM = m; startD = c2 + 1; }
  var startDMax = new Date(startY, startM + 1, 0).getDate();
  if (startD > startDMax) startD = startDMax;
  return {
    key: endY + "-" + String(endM + 1).padStart(2, "0") + "-" + half,
    label: shortMon(startM) + " " + startD + " – " + shortMon(endM) + " " + endD + ", " + endY,
    order: endY * 1000 + endM * 10 + (half === "A" ? 1 : 2),
  };
}

function otAddDays(dateKey, n) {
  var p = String(dateKey).split("-").map(Number);
  var dt = new Date(Date.UTC(p[0], p[1] - 1, p[2] + n));
  return dt.toISOString().slice(0, 10);
}

function computeEngineerOt(engineerName, allVisits, otSettings, holidayMap) {
  var settings = otSettings || DEFAULT_OT_SETTINGS;
  var byDate = {};
  var incompleteCount = 0;
  (allVisits || []).forEach(function (v) {
    var involved = v.engineer === engineerName || v.engineer2 === engineerName || v.engineer3 === engineerName;
    if (!involved) return;
    var start = otParseDT(v.dtDeparture) || otParseDT(v.dtWorkStarted);
    var end   = otParseDT(v.dtArrivalHome) || otParseDT(v.dtWorkEnded);
    if (!start || !end || end.getTime() <= start.getTime()) { if (v.date) incompleteCount++; return; }
    var dateKey = v.date || start.toISOString().slice(0, 10);
    if (!byDate[dateKey]) byDate[dateKey] = { starts: [], ends: [], visitIds: [], isrNos: [] };
    byDate[dateKey].starts.push(start);
    byDate[dateKey].ends.push(end);
    byDate[dateKey].visitIds.push(v.id);
    if (v.isrNo) byDate[dateKey].isrNos.push(v.isrNo);
  });
  var days = Object.keys(byDate).sort().map(function (dateKey) {
    var rec = byDate[dateKey];
    var dayStart = new Date(Math.min.apply(null, rec.starts.map(function (d) { return d.getTime(); })));
    var dayEnd   = new Date(Math.max.apply(null, rec.ends.map(function (d) { return d.getTime(); })));
    var totalHours = otHoursBetween(dayStart, dayEnd);
    var holidayName = holidayMap && holidayMap[dateKey] ? holidayMap[dateKey] : "";
    var isHoliday = !!holidayName;
    var norm = otNormSchedule(settings);
    var sch = norm.schedule[OT_DAY_KEYS[otWeekday(dateKey)]];
    var isRestDay = !!(sch && sch.off);
    var regularHours, otHours;
    if (isHoliday || isRestDay) {
      // Holiday or scheduled rest day (e.g. Sunday): the whole worked span is OT.
      regularHours = 0; otHours = totalHours;
    } else {
      var offStart = new Date(dateKey + "T" + (sch.start || "08:00") + ":00");
      var offEnd   = new Date(dateKey + "T" + (sch.end   || "17:30") + ":00");
      var overlapStartMs = Math.max(dayStart.getTime(), offStart.getTime());
      var overlapEndMs   = Math.min(dayEnd.getTime(), offEnd.getTime());
      regularHours = overlapEndMs > overlapStartMs ? (overlapEndMs - overlapStartMs) / 3600000 : 0;
      // Grace rule: the first graceMinutes after office end are NOT yet overtime
      // (e.g. 17:30–18:30). Morning OT (before office start) has no grace.
      var graceMs = norm.graceMinutes * 60000;
      var morningOtMs = Math.max(0, Math.min(dayEnd.getTime(), offStart.getTime()) - dayStart.getTime());
      var eveningOtMs = Math.max(0, dayEnd.getTime() - Math.max(dayStart.getTime(), offEnd.getTime() + graceMs));
      otHours = (morningOtMs + eveningOtMs) / 3600000;
    }
    return {
      date: dateKey, totalHours: otRound2(totalHours), regularHours: otRound2(regularHours), otHours: otRound2(otHours),
      isHoliday: isHoliday, holidayName: holidayName, restDay: isRestDay, visitCount: rec.visitIds.length, isrNos: rec.isrNos,
      dayStart: dayStart, dayEnd: dayEnd,
    };
  });
  return { days: days, incompleteCount: incompleteCount };
}

function isOtManagerRoleName(role) {
  var r = String(role || "").trim().toLowerCase();
  if (!r) return false;
  return r === "hr" || r.indexOf("human resource") !== -1 || r.indexOf("accounting") !== -1 || r.indexOf("accountant") !== -1;
}

function invPlacement(labs, serial) {
  var sn = String(serial || "").trim().toLowerCase();
  if (!sn) return { state: "In Warehouse", lab: "", returnedSuggested: "" };
  var installed = null, installedKey = "", returned = null, returnedKey = "";
  function _later(a, b) { a = String(a || ""); b = String(b || ""); if (a && !b) return true; if (!a && b) return false; return a >= b; }
  (labs || []).forEach(function (lab) {
    (lab.machines || []).forEach(function (m) {
      if (String(m.serialNo || "").trim().toLowerCase() !== sn) return;
      if (isMachineReleased(m)) {
        var k = invLastOutDate(m) || m.installDate || "";   // when it most recently left this lab
        if (returned == null || _later(k, returnedKey)) { returned = lab.name || ""; returnedKey = k; }
      } else {
        var ik = m.installDate || "";
        if (installed == null || _later(ik, installedKey)) { installed = lab.name || ""; installedKey = ik; }
      }
    });
  });
  if (installed != null) return { state: "Installed", lab: installed, returnedSuggested: "" };
  if (returned != null) {
    var po = latestPullOut(labs, serial);
    // Auto returned-date only when the unit was actually "Pulled-out"; for
    // "Instrument is ready for pull-out" the returned date stays a manual entry.
    var sugg = (po && po.mode === "pulled") ? (po.date || "") : "";
    return { state: "Returned", lab: returned, returnedSuggested: sugg };
  }
  return { state: "In Warehouse", lab: "", returnedSuggested: "" };
}

function invEffectiveStatus(storedStatus, placementState) {
  if (placementState === "Installed") return "Onsite";
  var st = String(storedStatus || "").trim();

  var sn = String(serial || "").trim().toLowerCase();
  if (!sn) return [];
  var set = {};
  (labs || []).forEach(function (lab) {
    (lab.machines || []).forEach(function (m) {
      if (String(m.serialNo || "").trim().toLowerCase() !== sn) return;
      // Any install evidence at this lab: an install date, or an installation visit.
      var installed = !!m.installDate;
      (m.visits || []).forEach(function (v) { if (String(v.type || "").trim().toLowerCase() === "installation") installed = true; });
      if (installed) { var nm = _normLabName(lab.name); if (nm) set[nm] = true; }

}

function invEffectiveCondition(storedCondition, labs, serial) {
  var c = String(storedCondition || "").trim().toUpperCase();
  if (c && c !== "BRAND NEW" && c !== "USED" && c !== "BNEW") return storedCondition;  // keep explicit non-new/used states

}

function invMovements(labs, serial) {
  var sn = String(serial || "").trim().toLowerCase();
  if (!sn) return [];
  var ev = [];
  (labs || []).forEach(function (lab) {
    (lab.machines || []).forEach(function (m) {
      if (String(m.serialNo || "").trim().toLowerCase() !== sn) return;
      var labName = lab.name || "";
      // Gather this machine's Installation visits separately so precedence can pick.
      var installVisits = [];
      var hasPull = false;
      (m.visits || []).forEach(function (v) {
        var vs = String(v.machineStatus || "").trim().toLowerCase();
        var vt = String(v.type || "").trim().toLowerCase();
        if (vt === "installation") installVisits.push(v);
        var isPull = vt === "pull-out" || PULLOUT_VISIT_STATUSES.indexOf(vs) !== -1;
        if (isPull) {
          hasPull = true;
          var label = (vs === "instrument is ready for pull-out") ? "Ready for pull-out at " : "Pulled out from ";
          ev.push({ date: v.date || "", dir: "OUT", lab: labName, detail: (label + labName), source: "Visit", isr: v.isrNo || "" });
        }
      });
      // INSTALL precedence: Info date present → use it (rules 3 & 4); otherwise
      // fall back to Installation visits (rule 1). Neither → nothing (rule 2).
      // A blank field, or a "-"/"—" placeholder, counts as "no Info date".
      var infoDateRaw = String(m.installDate || "").trim();
      var hasInfoDate = !!infoDateRaw && infoDateRaw !== "-" && infoDateRaw !== "\u2014";
      if (hasInfoDate) {
        ev.push({ date: m.installDate, dir: "IN", lab: labName, detail: "Installed at " + labName, source: "Install record", isr: "" });
      } else {
        installVisits.forEach(function (v) {
          ev.push({ date: v.date || "", dir: "IN", lab: labName, detail: "Installed at " + labName, source: "Visit", isr: v.isrNo || "" });
        });
      }
      if (String(m.status) === "Pulled-out" && !hasPull) ev.push({ date: "", dir: "OUT", lab: labName, detail: "Pulled out from " + labName, source: "Status", isr: "" });
    });
  });
  ev.sort(function (a, b) { if (!a.date && !b.date) return 0; if (!a.date) return 1; if (!b.date) return -1; return String(a.date).localeCompare(String(b.date)); });
  var seen = {}, out = [];
  ev.forEach(function (e) { var k = e.dir + "|" + e.lab + "|" + e.date + "|" + e.detail; if (!seen[k]) { seen[k] = 1; out.push(e); } });
  return out;
}

function isNonAnalyticsVisit(v) { return NON_ANALYTICS_VISIT_TYPES.indexOf(String(v && v.type || "").trim().toLowerCase()) !== -1; }

function fmtManilaDate(d) {
  try { return new Intl.DateTimeFormat("en-US", { timeZone:"Asia/Manila", weekday:"short", month:"short", day:"numeric", year:"numeric" }).format(d || new Date()); }
  catch(e) { return (d||new Date()).toDateString(); }
}

function fmtManilaTime(d) {
  try { return new Intl.DateTimeFormat("en-US", { timeZone:"Asia/Manila", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:true }).format(d || new Date()); }
  catch(e) { return (d||new Date()).toLocaleTimeString(); }

<script type="text/babel">

// ── Live presence: who's viewing, unique cursor colors, name/anonymous toggle ──
// Uses Firebase REALTIME DATABASE (not Firestore) because cursor streams need a

const PRESENCE_COLORS = [
  "#38bdf8","#a78bfa","#34d399","#fbbf24","#fb7185","#22d3ee","#f97316","#4ade80",
  "#e879f9","#f43f5e","#60a5fa","#facc15","#2dd4bf","#c084fc","#fb923c","#a3e635",
  "#f472b6","#818cf8","#10b981","#eab308","#06b6d4","#ef4444"

try {
  if (firebase.database && firebaseConfig.databaseURL && firebaseConfig.databaseURL.indexOf("PASTE_") === -1) {

    rtdbOk = true;

// Pick a color no current viewer is using; fall back to a golden-angle hue.
function pickPresenceColor(existing) {
  const used = {};
  Object.values(existing || {}).forEach(p => { if (p && p.color) used[p.color] = 1; });
  for (const c of PRESENCE_COLORS) if (!used[c]) return c;
  let h = 0; for (const ch of SESSION_ID) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return "hsl(" + Math.round((h % 360)) + ",85%,62%)";
}

// React hook: joins presence, streams my cursor, subscribes to everyone else's.
// Returns { viewers, cursors, myColor, showName, setShowName, count }.
function usePresence(user, profile) {
  const [viewers, setViewers] = useState({});
  const [cursors, setCursors] = useState({});
  const [myColor, setMyColor] = useState(PRESENCE_COLORS[0]);
  const [showName, setShowNameState] = useState(() => { try { return localStorage.getItem("ibase_showname") !== "0"; } catch (e) { return true; } });
  const joinedRef = useRef(false);
  const colorRef = useRef(null);

  // join / update my presence record
  useEffect(() => {
    if (!rtdbOk) return;
    let cancelled = false;
    const myRef = rtdb.ref("presence/" + SESSION_ID);
    (async () => {
      try {
        if (!joinedRef.current) {
          const snap = await rtdb.ref("presence").once("value");
          if (cancelled) return;
          colorRef.current = pickPresenceColor(snap.val());
          setMyColor(colorRef.current);
          joinedRef.current = true;
          myRef.onDisconnect().remove();
          rtdb.ref("cursors/" + SESSION_ID).onDisconnect().remove();
        }
        const displayName = user
          ? (showName ? ((profile && profile.displayName) || user.email) : "Anonymous")
          : "Guest";

    if (!rtdbOk) return;

    return () => { window.removeEventListener("beforeunload", bye); bye(); };

    if (!rtdbOk) return;

    const onP = pRef.on("value", s => setViewers(s.val() || {}));
    const onC = cRef.on("value", s => setCursors(s.val() || {}));

    if (!rtdbOk) return;

    };

    return () => window.removeEventListener("mousemove", onMove);

  return { viewers, cursors, myColor, showName, setShowName, count, enabled: rtdbOk };

// PM flag from a machine's nextPM date
function pmFlag(m) {
  const d = String(m && m.nextPM || "").slice(0, 10);
  if (!d) return "OK";
  const t = today();
  if (d < t) return "Overdue";
  const [ty, tm] = t.split("-").map(Number), [y, mo] = d.split("-").map(Number);
  if (y === ty && mo === tm) return "Due This Month";
  const nm = tm === 12 ? [ty + 1, 1] : [ty, tm + 1];
  if (y === nm[0] && mo === nm[1]) return "Due Next Month";
  return "OK";
}
const FLAG_COLORS = { "Overdue":"#ef4444", "Due This Month":"#f97316", "Due Next Month":"#f59e0b", "OK":"#38bdf8" };

    }},
    overtime:  { view: true,  edit: true },
  };
}
function pCanTab(p, tab, mode) {
  if (!p) return false;
  if (p.isAdmin) return true;
  const t = p.permissions && p.permissions[tab];
  return !!(t && t[mode]);
}
function pCanSub(p, sub, mode) {
  if (!p) return false;
  if (p.isAdmin) return true;
  const inv = p.permissions && p.permissions.inventory;
  return !!(inv && inv.edit && inv.subs && inv.subs[sub] && inv.subs[sub][mode]);
}
function pBrandOk(p, sub, brand) {
  if (!p) return false;
  if (p.isAdmin) return true;
  if (!pCanSub(p, sub, "edit")) return false;
  const bl = p.permissions.inventory.subs[sub].brands;
  return bl === null || bl === undefined || (Array.isArray(bl) && bl.indexOf(brand) !== -1);
}
function pIsOtManager(p) { return !!p && (p.isAdmin || isOtManagerRoleName(p.role)); }

// ── live Firestore collection hook ──────────────────────────────────────────
function useCol(path, enabled, notify) {
  const [docs, setDocs] = useState([]);
  useEffect(() => {
    if (!enabled) { setDocs([]); return; }
    const unsub = db.collection(path).onSnapshot(
      s => setDocs(s.docs.map(d => ({ id: d.id, ...d.data() }))),
      e => notify && notify(path + ": " + e.message, "error"));
    return () => unsub();
  }, [path, enabled]);
  return docs;
}
function useDoc(path, enabled) {
  const [data, setData] = useState(null);
  useEffect(() => {
    if (!enabled) { setData(null); return; }
    const unsub = db.doc(path).onSnapshot(d => setData(d.exists ? d.data() : null), () => setData(null));
    return () => unsub();
  }, [path, enabled]);
  return data;
}

// ── Overtime (full v127 workflow: engine, applications, revert, conversation) ─
function OvertimeTab({ profile, labs, users, notify }) {
  const isMgr = pIsOtManager(profile);
  const editable = pCanTab(profile, "overtime", "edit");
  const myName = profile.engineerName || "";
  const otSettings = useDoc("config/otSettings", true) || DEFAULT_OT_SETTINGS;
  const holidaysDoc = useDoc("config/holidays", true);
  const holidays = (holidaysDoc && holidaysDoc.list) || [];
  const holidayMap = useMemo(() => otHolidayMapFromList(holidays), [holidays]);
  const apps = useCol("otApplications", true, notify);
  const [showSettings, setShowSettings] = useState(false);

  // all visits across labs (engineer fields matched by the engine)
  const allVisits = useMemo(() => labs.flatMap(l => (l.machines||[]).flatMap(m => m.visits || [])), [labs]);
  // engineer names: from user profiles + visit logs
  const engineerNames = useMemo(() => {
    const set = {};
    users.forEach(u => { if (u.engineerName) set[u.engineerName] = 1; });
    allVisits.forEach(v => ["engineer","engineer2","engineer3"].forEach(k => { if (v[k]) set[v[k]] = 1; }));
    return Object.keys(set).sort();
  }, [users, allVisits]);
  const visibleEngineers = isMgr ? engineerNames : (myName ? [myName] : []);

  const [selectedEng, setSelectedEng] = useState(isMgr ? "__all__" : "");
  const [period, setPeriod] = useState("__allhist__");
  const [otFrom, setOtFrom] = useState(""); const [otTo, setOtTo] = useState("");

  const ledgers = useMemo(() => {
    const map = {};
    visibleEngineers.forEach(n => { map[n] = computeEngineerOt(n, allVisits, otSettings, holidayMap); });
    return map;
  }, [visibleEngineers.join("|"), allVisits, otSettings, holidayMap]);

  const periodOptions = useMemo(() => {
    const seen = {};
    Object.values(ledgers).forEach(l => l.days.forEach(d => { const c = otCutoffForDate(d.date, otSettings); seen[c.key] = c; }));
    const tc = otCutoffForDate(today(), otSettings); seen[tc.key] = tc;
    return Object.values(seen).sort((a,b)=>b.order-a.order);
  }, [ledgers, otSettings]);
  const currentPeriodKey = otCutoffForDate(today(), otSettings).key;
  const effKey = period === "__current__" ? currentPeriodKey : period;
  function daysInPeriod(n) {
    const l = ledgers[n]; if (!l) return [];
    if (period === "__allhist__") return l.days;
    if (period === "__range__") {
      if (!otFrom && !otTo) return l.days;
      return l.days.filter(d => { const k = String(d.date).slice(0,10); if (otFrom && k < otFrom) return false; if (otTo && k > otTo) return false; return true; });
    }
    return l.days.filter(d => otCutoffForDate(d.date, otSettings).key === effKey);
  }
  const periodLabel = period === "__allhist__" ? "All history"
    : period === "__range__" ? ((otFrom||otTo) ? ((otFrom?fmtDate(otFrom):"start") + " → " + (otTo?fmtDate(otTo):"today")) : "All history")
    : ((periodOptions.find(p=>p.key===effKey)||{}).label || "Current period");

  // application map + mutations (server rules enforce owner/manager)
  const appMap = useMemo(() => { const m = {}; apps.forEach(a => { if (a.engineerName && a.date) m[a.engineerName + "|" + a.date] = a; }); return m; }, [apps]);
  async function upsert(prev, data, okMsg) {
    try {
      if (prev && prev.id) await db.collection("otApplications").doc(prev.id).update(data);
      else await db.collection("otApplications").add(data);
      notify(okMsg, "ok"); return true;
    } catch (e) { notify("SERVER REFUSED:\n" + e.message, "error"); return false; }
  }
  function applyFor(engName, dateKey, cashH, offsetH) {
    const prev = appMap[engName + "|" + dateKey];
    return upsert(prev, { engineerName: engName, date: dateKey, cashHours: cashH, offsetHours: offsetH,
      status: "pending", apCash: 0, apOffset: 0, appliedBy: profile.email, appliedAt: auditNow(),
      decidedBy: "", decidedAt: "", remarks: "", thread: (prev && prev.thread) || [] }, "OT application filed.");
  }
  function decideApp(engName, dateKey, approve, apC, apO, remarks) {
    const prev = appMap[engName + "|" + dateKey]; if (!prev) return;
    return upsert(prev, { status: approve ? "approved" : "rejected", apCash: approve ? apC : 0, apOffset: approve ? apO : 0,
      decidedBy: profile.email, decidedAt: auditNow(), remarks: remarks || "" }, approve ? "Approved." : "Rejected.");
  }
  function revertApp(engName, dateKey) {
    const prev = appMap[engName + "|" + dateKey]; if (!prev || prev.status === "pending") return;
    return upsert(prev, { status: "pending", apCash: 0, apOffset: 0, decidedBy: "", decidedAt: "", remarks: "",
      revertedBy: profile.email, revertedAt: auditNow() }, "Reverted to pending for re-review.");
  }
  function postMessage(engName, dateKey, text) {
    const prev = appMap[engName + "|" + dateKey]; const t = String(text||"").trim();
    if (!prev || !t) return;
    const msg = { by: profile.email, role: isMgr ? "manager" : "employee", text: t, at: auditNow() };
    return upsert(prev, { thread: [ ...(prev.thread||[]), msg ] }, "Message sent.");
  }
  async function withdraw(engName, dateKey) {
    const prev = appMap[engName + "|" + dateKey]; if (!prev) return;
    try { await db.collection("otApplications").doc(prev.id).delete(); notify("Application withdrawn.", "ok"); }
    catch (e) { notify("SERVER REFUSED:\n" + e.message, "error"); }
  }

  function totalsFor(n) {
    return daysInPeriod(n).reduce((acc,d)=>{
      acc.regular += d.regularHours; acc.ot += d.otHours; acc.total += d.totalHours;
      const a = appMap[n + "|" + d.date];
      if (a) {
        const rc = Number(a.cashHours)||0, ro = Number(a.offsetHours)||0;
        acc.reqCash += rc; acc.reqOffset += ro;
        if (a.status === "pending") acc.pending++;
        else { const ac = Number(a.apCash)||0, ao = Number(a.apOffset)||0; acc.apCash += ac; acc.apOffset += ao; acc.balance += Math.max(0,(rc+ro)-(ac+ao)); }
      }
      return acc;
    }, { regular:0, ot:0, total:0, reqCash:0, reqOffset:0, apCash:0, apOffset:0, pending:0, balance:0 });
  }

  // ---- one day's application lifecycle cell (v127 OtAppCell + OtThread) ----
  function OtAppCell({ engName, d }) {
    const app = appMap[engName + "|" + d.date];
    const isOwner = engName === myName;
    const canFile = editable && (isOwner || isMgr);
    const [mode, setMode] = useState("");
    const [c, setC] = useState(""); const [o, setO] = useState("");
    const [ac, setAc] = useState(""); const [ao, setAo] = useState(""); const [rm, setRm] = useState("");
    const [err, setErr] = useState("");
    const tiny = { fontSize:9.5, color:"var(--c-text5)", whiteSpace:"nowrap" };
    const numIn = (v,set)=><input type="number" min="0" step="0.25" value={v} onChange={e=>{set(e.target.value);setErr("");}} style={{ ...inputSt(), width:64, padding:"3px 6px", fontSize:11.5 }} />;
    const chip = (bg,bd,col,txt)=><span style={{ fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:999, background:bg, color:col, border:"1px solid "+bd, whiteSpace:"nowrap" }}>{txt}</span>;
    const sb = (label,on,color)=><button onClick={on} style={{ background:"none", border:"1px solid var(--c-border)", borderRadius:6, color:color||"var(--c-text3)", fontSize:10, cursor:"pointer", padding:"2px 8px" }}>{label}</button>;

    function submitApply() {
      const nc = Number(c)||0, no = Number(o)||0;
      if (nc+no <= 0) { setErr("Enter the hours to apply."); return; }
      if (nc+no > d.otHours + 1e-9) { setErr("Cash + offset can't exceed this day's " + d.otHours.toFixed(2) + " OT hours."); return; }
      applyFor(engName, d.date, nc, no); setMode("");
    }
    function submitDecision(approve) {
      const nac = Number(ac)||0, nao = Number(ao)||0;
      const rc = Number(app.cashHours)||0, ro = Number(app.offsetHours)||0;
      if (approve && (nac > rc+1e-9 || nao > ro+1e-9)) { setErr("Approved hours can't exceed the requested hours."); return; }
      const partial = approve && (nac+nao) < (rc+ro) - 1e-9;
      if ((!approve || partial) && !rm.trim()) { setErr(approve ? "Give remarks explaining the partial approval." : "Give remarks explaining the rejection."); return; }
      decideApp(engName, d.date, approve, nac, nao, rm.trim()); setMode("");
    }
    if (mode === "apply") return (
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
          <span style={tiny}>💵 Cash</span>{numIn(c,setC)}<span style={tiny}>🔁 Offset</span>{numIn(o,setO)}<span style={tiny}>of {d.otHours.toFixed(2)}h OT</span>
        </div>
        {err && <div style={{ fontSize:10, color:"#f87171", fontWeight:600 }}>⚠ {err}</div>}
        <div style={{ display:"flex", gap:6 }}>{sb("✔ Submit",submitApply,"#34d399")}{sb("Cancel",()=>setMode(""))}</div>
      </div>
    );
    if (mode === "decide") return (
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
          <span style={tiny}>approve 💵</span>{numIn(ac,setAc)}<span style={tiny}>🔁</span>{numIn(ao,setAo)}
          <span style={tiny}>of 💵{Number(app.cashHours||0).toFixed(2)} + 🔁{Number(app.offsetHours||0).toFixed(2)} requested</span>
        </div>
        <input value={rm} onChange={e=>{setRm(e.target.value);setErr("");}} placeholder="Remarks / notice to the employee…" style={{ ...inputSt(), fontSize:11, padding:"4px 7px" }} />
        {err && <div style={{ fontSize:10, color:"#f87171", fontWeight:600 }}>⚠ {err}</div>}
        <div style={{ display:"flex", gap:6 }}>{sb("✅ Approve",()=>submitDecision(true),"#34d399")}{sb("❌ Reject",()=>submitDecision(false),"#f87171")}{sb("Cancel",()=>setMode(""))}</div>
      </div>
    );
    if (!app) return canFile && d.otHours > 0
      ? <button onClick={()=>{ setC(""); setO(""); setErr(""); setMode("apply"); }} style={{ ...btnSt("var(--c-border)","var(--c-text2)"), padding:"4px 10px", fontSize:11 }}>✋ Apply OT</button>
      : <span style={{ color:"var(--c-text5)", fontSize:11 }}>—</span>;
    const rc = Number(app.cashHours)||0, ro = Number(app.offsetHours)||0;
    const aC = Number(app.apCash)||0, aO = Number(app.apOffset)||0;
    const bal = Math.max(0,(rc+ro)-(aC+aO));
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:3, minWidth:250 }}>
        {app.status === "pending" && (
          <React.Fragment>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
              {chip("rgba(251,191,36,.13)","rgba(251,191,36,.4)","#fbbf24","⏳ Pending")}
              <span style={{ fontSize:11, fontFamily:"monospace", color:"var(--c-text2)" }}>💵 {rc.toFixed(2)}h + 🔁 {ro.toFixed(2)}h</span>
            </div>
            <div style={tiny}>filed by {app.appliedBy}{app.appliedAt ? " · " + String(app.appliedAt).slice(0,10) : ""}</div>
            {app.revertedBy && <div style={{ fontSize:9.5, color:"#fbbf24" }}>↩ reverted for re-review by {app.revertedBy}{app.revertedAt ? " · " + String(app.revertedAt).slice(0,10) : ""}</div>}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {isOwner && editable && sb("✏️ Edit",()=>{ setC(String(rc)); setO(String(ro)); setMode("apply"); })}
              {isOwner && editable && sb("🗑 Withdraw",()=>withdraw(engName,d.date),"#f87171")}
              {isMgr && editable && sb("⚖ Review",()=>{ setAc(String(rc)); setAo(String(ro)); setRm(""); setMode("decide"); },"#38bdf8")}
            </div>
          </React.Fragment>
        )}
        {app.status === "approved" && (
          <React.Fragment>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
              {chip("rgba(16,185,129,.13)","rgba(16,185,129,.4)","#34d399","✅ Approved")}
              <span style={{ fontSize:11, fontFamily:"monospace", color:"var(--c-text2)" }}>💵 {aC.toFixed(2)}h + 🔁 {aO.toFixed(2)}h</span>
            </div>
            <div style={tiny}>requested 💵 {rc.toFixed(2)} + 🔁 {ro.toFixed(2)} · by {app.decidedBy}{app.decidedAt ? " · " + String(app.decidedAt).slice(0,10) : ""}</div>
            {bal > 1e-9 && <div style={{ fontSize:10, color:"#fbbf24", fontWeight:700 }}>⚖ {bal.toFixed(2)}h unapproved balance (kept on record)</div>}
            {app.remarks && <div style={{ fontSize:10, color:"var(--c-text4)", maxWidth:260, whiteSpace:"normal" }}>📝 {app.remarks}</div>}
            {isMgr && editable && <div style={{ display:"flex", gap:6 }}>{sb("⚖ Revise",()=>{ setAc(String(aC)); setAo(String(aO)); setRm(app.remarks||""); setMode("decide"); })}{sb("↩ Revert to pending",()=>revertApp(engName,d.date),"#fbbf24")}</div>}
          </React.Fragment>
        )}
        {app.status === "rejected" && (
          <React.Fragment>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
              {chip("rgba(248,113,113,.13)","rgba(248,113,113,.4)","#f87171","❌ Rejected")}
              <span style={{ fontSize:11, fontFamily:"monospace", color:"var(--c-text4)", textDecoration:"line-through" }}>💵 {rc.toFixed(2)}h + 🔁 {ro.toFixed(2)}h</span>
            </div>
            <div style={tiny}>by {app.decidedBy}{app.decidedAt ? " · " + String(app.decidedAt).slice(0,10) : ""} · request kept on record</div>
            {app.remarks && <div style={{ fontSize:10, color:"var(--c-text4)", maxWidth:260, whiteSpace:"normal" }}>📝 {app.remarks}</div>}
            {isMgr && editable && <div style={{ display:"flex", gap:6 }}>{sb("⚖ Revise",()=>{ setAc("0"); setAo("0"); setRm(app.remarks||""); setMode("decide"); })}{sb("↩ Revert to pending",()=>revertApp(engName,d.date),"#fbbf24")}</div>}
            {isOwner && editable && <div>{sb("✋ Re-apply",()=>{ setC(String(rc)); setO(String(ro)); setMode("apply"); })}</div>}
          </React.Fragment>
        )}
        <OtThread app={app} engName={engName} d={d} isOwner={isOwner} />
      </div>
    );
  }
  // ---- conversation thread (v127) ----
  function OtThread({ app, engName, d, isOwner }) {
    const thread = Array.isArray(app.thread) ? app.thread : [];
    const canReply = editable && (isMgr || isOwner);
    const [open, setOpen] = useState(false);
    const [txt, setTxt] = useState("");
    if (thread.length === 0 && !canReply) return null;
    const send = () => { const t = txt.trim(); if (!t) return; postMessage(engName, d.date, t); setTxt(""); };
    return (
      <div style={{ marginTop:4, borderTop:"1px dashed var(--c-border)", paddingTop:5 }}>
        <button onClick={()=>setOpen(o=>!o)} style={{ background:"none", border:"none", color:"var(--c-text4)", cursor:"pointer", fontSize:10, fontWeight:700, padding:0 }}>
          💬 Conversation{thread.length ? " ("+thread.length+")" : ""} <span style={{ fontSize:8 }}>{open?"▲":"▼"}</span>
        </button>
        {open && (
          <div style={{ marginTop:5, display:"flex", flexDirection:"column", gap:4, maxWidth:300 }}>
            {thread.length === 0 && <div style={{ fontSize:10, color:"var(--c-text5)", fontStyle:"italic" }}>No messages yet — start the conversation below.</div>}
            {thread.map((m,i)=>{
              const mine = m.by === profile.email; const mgr = m.role === "manager";
              return (
                <div key={i} style={{ alignSelf: mine?"flex-end":"flex-start", maxWidth:"88%", background: mgr?"rgba(56,189,248,.12)":"rgba(167,139,250,.12)", border:"1px solid "+(mgr?"rgba(56,189,248,.3)":"rgba(167,139,250,.3)"), borderRadius:9, padding:"4px 8px" }}>
                  <div style={{ fontSize:8.5, fontWeight:800, textTransform:"uppercase", color: mgr?"#38bdf8":"#a78bfa", marginBottom:1 }}>{mgr?"🛠 ":"👤 "}{m.by}{mgr?" · manager":""}</div>
                  <div style={{ fontSize:11, color:"var(--c-text2)", whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{m.text}</div>
                  <div style={{ fontSize:8, color:"var(--c-text5)", marginTop:1 }}>{m.at ? String(m.at).replace("T"," ").slice(0,16) : ""}</div>
                </div>
              );
            })}
            {canReply && (
              <div style={{ display:"flex", gap:4 }}>
                <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{ if (e.key==="Enter") { e.preventDefault(); send(); } }} placeholder="Write a reply…" style={{ ...inputSt(), fontSize:11, padding:"4px 7px", flex:1 }} />
                <button onClick={send} disabled={!txt.trim()} style={{ ...btnSt(txt.trim()?"#38bdf8":"var(--c-border)", txt.trim()?"var(--c-bg)":"var(--c-text5)"), padding:"4px 10px", fontSize:11 }}>➤</button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  function DayTable({ engName }) {
    const days = daysInPeriod(engName);
    const totals = totalsFor(engName);
    return (
      <div style={cardSt}>
        <div style={{ display:"flex", gap:20, flexWrap:"wrap", marginBottom:16 }}>
          {[["Employee",engName,"var(--c-key)"],["Period",periodLabel,"var(--c-text)"],["Regular Hours",totals.regular.toFixed(2),"var(--c-text)"],["Overtime Hours",totals.ot.toFixed(2),"#fbbf24"],
            ["💵 Cash Approved",totals.apCash.toFixed(2)+" (req "+totals.reqCash.toFixed(2)+")","#34d399"],
            ["🔁 Offset Approved",totals.apOffset.toFixed(2)+" (req "+totals.reqOffset.toFixed(2)+")","#a78bfa"],
            ["⏳ Pending",String(totals.pending),"#fbbf24"],["⚖ Balance",totals.balance.toFixed(2)+"h on record","var(--c-text3)"]].map(([t,v,c])=>(
            <div key={t}><div style={{ fontSize:10.5, color:"var(--c-text4)", fontWeight:700, textTransform:"uppercase" }}>{t}</div><div style={{ fontSize:14, fontWeight:800, color:c, marginTop:2 }}>{v}</div></div>
          ))}
        </div>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead><tr>{["Date","Visits","Total Hrs","Regular","OT Hrs","OT Application (Cash / Offset)","Notes"].map(h=><th key={h} style={thSt}>{h}</th>)}</tr></thead>
          <tbody>
            {days.map(d=>(
              <tr key={d.date}>
                <td style={{ ...tdSt, whiteSpace:"nowrap" }}>{fmtDate(d.date)}</td>
                <td style={{ ...tdSt, fontSize:12, color:"var(--c-text3)" }}>{d.visitCount}{d.isrNos && d.isrNos.length ? " ("+d.isrNos.join(", ")+")" : ""}</td>
                <td style={{ ...tdSt, fontFamily:"monospace" }}>{d.totalHours.toFixed(2)}</td>
                <td style={{ ...tdSt, fontFamily:"monospace" }}>{d.regularHours.toFixed(2)}</td>
                <td style={{ ...tdSt, fontFamily:"monospace", fontWeight:800, color: d.otHours>0?"#fbbf24":"var(--c-text5)" }}>{d.otHours.toFixed(2)}</td>
                <td style={tdSt}>{d.otHours > 0 ? <OtAppCell engName={engName} d={d} /> : <span style={{ color:"var(--c-text5)", fontSize:11 }}>—</span>}</td>
                <td style={{ ...tdSt, fontSize:11, color:"var(--c-text4)" }}>{d.holidayName || ""}</td>
              </tr>
            ))}
            {days.length === 0 && <tr><td colSpan={7} style={{ ...tdSt, color:"var(--c-text4)" }}>{period==="__allhist__" ? "No overtime records yet." : period==="__range__" ? "No overtime in the selected date range." : "No records in this cutoff period."}</td></tr>}
          </tbody>
        </table>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:16, fontWeight:900 }}>🕒 Overtime</div>
          <div style={{ fontSize:11.5, color:"var(--c-text4)" }}>Computed automatically from service-visit departure/arrival (or work start/end) times.</div>
        </div>
        {isMgr && <button style={{ ...btnSt("var(--c-border)","var(--c-text2)"), marginLeft:"auto" }} onClick={()=>setShowSettings(true)}>⚙ Office Hours, Holidays & Cutoff</button>}
      </div>
      <div style={{ display:"flex", alignItems:"flex-end", gap:14, flexWrap:"wrap", marginBottom:14 }}>
        {isMgr && (
          <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
            <label style={labelSt}>Employee</label>
            <select style={{ ...inputSt(), minWidth:220, cursor:"pointer" }} value={selectedEng} onChange={e=>setSelectedEng(e.target.value)}>
              <option value="__all__">All Employees (summary)</option>
              {engineerNames.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
        )}
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          <label style={labelSt}>Show</label>
          <select style={{ ...inputSt(), minWidth:250, cursor:"pointer" }} value={period} onChange={e=>setPeriod(e.target.value)}>
            <option value="__allhist__">📚 All history (complete records)</option>
            <option value="__range__">📅 Custom date range…</option>
            <option value="__current__">Current cutoff ({(periodOptions.find(p=>p.key===currentPeriodKey)||{}).label||"…"})</option>
            {periodOptions.filter(p=>p.key!==currentPeriodKey).map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
          </select>
        </div>
        {period === "__range__" && (
          <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
            <label style={labelSt}>Date range</label>
            <div style={{ display:"flex", alignItems:"center", gap:6, height:38, background:"var(--c-bg)", border:"1px solid "+((otFrom||otTo)?"#38bdf8":"var(--c-border)"), borderRadius:8, padding:"0 10px" }}>
              <span style={{ fontSize:10.5, fontWeight:700, color:(otFrom||otTo)?"#38bdf8":"var(--c-text4)" }}>From</span>
              <input type="date" value={otFrom} max={otTo||undefined} onChange={e=>setOtFrom(e.target.value)} style={{ background:"transparent", border:"none", color:"var(--c-text2)", fontSize:11.5 }} />
              <span style={{ fontSize:11, color:"var(--c-text5)" }}>→</span>
              <input type="date" value={otTo} min={otFrom||undefined} onChange={e=>setOtTo(e.target.value)} style={{ background:"transparent", border:"none", color:"var(--c-text2)", fontSize:11.5 }} />
              {(otFrom||otTo) && <button onClick={()=>{setOtFrom("");setOtTo("");}} style={{ background:"none", border:"none", color:"var(--c-text4)", cursor:"pointer" }}>✕</button>}
            </div>
          </div>
        )}
      </div>

      {(!isMgr && !myName) && <div style={cardSt}><div style={{ fontSize:13, color:"var(--c-text3)" }}>Your account isn't linked to an employee name yet — ask an administrator to set your "Linked employee name" so your overtime shows here.</div></div>}
      {isMgr && selectedEng === "__all__" && (
        <div style={cardSt}>
          <div style={{ fontSize:12, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", marginBottom:10 }}>All Employees — {periodLabel}</div>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Employee","Days","Regular Hrs","OT Hrs","💵 Approved Cash","🔁 Approved Offset","⏳ Pending",""].map(h=><th key={h} style={thSt}>{h}</th>)}</tr></thead>
            <tbody>
              {engineerNames.map(n=>{
                const t = totalsFor(n), dCount = daysInPeriod(n).length;
                if (!dCount) return null;
                return (
                  <tr key={n}>
                    <td style={{ ...tdSt, fontWeight:700, color:"var(--c-key)" }}>{n}</td>
                    <td style={tdSt}>{dCount}</td>
                    <td style={{ ...tdSt, fontFamily:"monospace" }}>{t.regular.toFixed(2)}</td>
                    <td style={{ ...tdSt, fontFamily:"monospace", fontWeight:800, color:t.ot>0?"#fbbf24":"var(--c-text5)" }}>{t.ot.toFixed(2)}</td>
                    <td style={{ ...tdSt, fontFamily:"monospace", color:t.apCash>0?"#34d399":"var(--c-text5)" }}>{t.apCash.toFixed(2)}</td>
                    <td style={{ ...tdSt, fontFamily:"monospace", color:t.apOffset>0?"#a78bfa":"var(--c-text5)" }}>{t.apOffset.toFixed(2)}</td>
                    <td style={{ ...tdSt, fontFamily:"monospace", fontWeight:700, color:t.pending>0?"#fbbf24":"var(--c-text5)" }}>{t.pending}</td>
                    <td style={tdSt}><button style={{ ...btnSt("var(--c-border)","var(--c-text2)"), padding:"4px 10px", fontSize:11 }} onClick={()=>setSelectedEng(n)}>View days</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{ marginTop:10, fontSize:10.5, color:"var(--c-text5)" }}>Employees with no logged days in this period are hidden from this summary.</div>
        </div>
      )}
      {isMgr && selectedEng !== "__all__" && <DayTable engName={selectedEng} />}
      {!isMgr && myName && <DayTable engName={myName} />}
      {showSettings && <OtSettingsModal otSettings={otSettings} holidays={holidays} notify={notify} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

function OtSettingsModal({ otSettings, holidays, notify, onClose }) {
  const [sched, setSched] = useState(() => otNormSchedule(otSettings));
  const [grace, setGrace] = useState(otSettings.graceMinutes != null ? otSettings.graceMinutes : 60);
  const [c1, setC1] = useState(otSettings.cutoff1 || 10);
  const [c2, setC2] = useState(otSettings.cutoff2 || 25);
  const [hols, setHols] = useState(holidays);
  const [hName, setHName] = useState(""); const [hFrom, setHFrom] = useState(""); const [hTo, setHTo] = useState(""); const [hType, setHType] = useState(HOLIDAY_TYPES[0]);
  const setDay = (k, field, v) => setSched(s => ({ ...s, [k]: { ...s[k], [field]: v } }));
  async function save() {
    try {
      await db.doc("config/otSettings").set({ schedule: sched, graceMinutes: Number(grace)||0, cutoff1: Number(c1)||10, cutoff2: Number(c2)||25 });
      await db.doc("config/holidays").set({ list: hols });
      notify("Overtime settings saved.", "ok"); onClose();
    } catch (e) { notify("SERVER REFUSED:\n" + e.message, "error"); }
  }
  return (
    <Modal title="⚙ Office Hours, Holidays & Cutoff" onClose={onClose} wide>
      <div style={{ fontSize:11, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", marginBottom:8 }}>Weekly office schedule</div>
      {["mon","tue","wed","thu","fri","sat","sun"].map(k=>(
        <div key={k} style={{ display:"flex", gap:10, alignItems:"center", marginBottom:6 }}>
          <span style={{ width:80, fontSize:12.5 }}>{OT_DAY_LABELS[k]}</span>
          <label style={{ fontSize:11.5, color:"var(--c-text3)", display:"flex", gap:5, cursor:"pointer" }}>
            <input type="checkbox" checked={!!sched[k].off} onChange={e=>setDay(k,"off",e.target.checked)} /> Rest day
          </label>
          {!sched[k].off && <React.Fragment>
            <input type="time" style={{ ...inputSt(), width:110 }} value={sched[k].start} onChange={e=>setDay(k,"start",e.target.value)} />
            <span style={{ color:"var(--c-text5)" }}>→</span>
            <input type="time" style={{ ...inputSt(), width:110 }} value={sched[k].end} onChange={e=>setDay(k,"end",e.target.value)} />
          </React.Fragment>}
        </div>
      ))}
      <div style={{ display:"flex", gap:14, marginTop:12, flexWrap:"wrap" }}>
        <div><label style={labelSt}>Grace minutes after office end</label><input type="number" style={{ ...inputSt(), width:120 }} value={grace} onChange={e=>setGrace(e.target.value)} /></div>
        <div><label style={labelSt}>Cutoff day 1</label><input type="number" style={{ ...inputSt(), width:100 }} value={c1} onChange={e=>setC1(e.target.value)} /></div>
        <div><label style={labelSt}>Cutoff day 2</label><input type="number" style={{ ...inputSt(), width:100 }} value={c2} onChange={e=>setC2(e.target.value)} /></div>
      </div>
      <div style={{ fontSize:11, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", margin:"18px 0 8px" }}>Holidays</div>
      {hols.map((h,i)=>(
        <div key={i} style={{ display:"flex", gap:10, alignItems:"center", fontSize:12.5, marginBottom:4 }}>
          <span style={{ flex:1 }}>{h.name}</span><span style={{ color:"var(--c-text4)" }}>{fmtDate(h.from)}{h.to && h.to!==h.from ? " – "+fmtDate(h.to) : ""}</span>
          <span style={{ fontSize:10.5, color:"var(--c-text4)" }}>{h.type}</span>
          <button onClick={()=>setHols(x=>x.filter((_,j)=>j!==i))} style={{ background:"none", border:"1px solid var(--c-border)", borderRadius:6, color:"#f87171", cursor:"pointer", padding:"1px 7px", fontSize:11 }}>✕</button>
        </div>
      ))}
      <div style={{ display:"flex", gap:8, marginTop:8, flexWrap:"wrap", alignItems:"flex-end" }}>
        <div style={{ flex:"1 1 140px" }}><label style={labelSt}>Name</label><input style={inputSt()} value={hName} onChange={e=>setHName(e.target.value)} /></div>
        <div><label style={labelSt}>From</label><input type="date" style={inputSt()} value={hFrom} onChange={e=>setHFrom(e.target.value)} /></div>
        <div><label style={labelSt}>To</label><input type="date" style={inputSt()} value={hTo} onChange={e=>setHTo(e.target.value)} /></div>
        <div><label style={labelSt}>Type</label><select style={inputSt()} value={hType} onChange={e=>setHType(e.target.value)}>{HOLIDAY_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        <button style={btnSt("var(--c-border)","var(--c-text2)")} disabled={!hName.trim()||!hFrom} onClick={()=>{ setHols(x=>[...x,{ id:uid(), name:hName.trim(), from:hFrom, to:hTo||hFrom, type:hType }]); setHName(""); setHFrom(""); setHTo(""); }}>+ Add</button>
        <button style={btnSt("var(--c-border)","var(--c-text2)")} onClick={()=>setHols(x=>{ const have={}; x.forEach(h=>have[h.name+h.from]=1); return [...x, ...PH_HOLIDAYS_2026.filter(h=>!have[h.name+h.from]).map(h=>({ ...h, id:uid() }))]; })}>🇵🇭 Load PH 2026</button>
      </div>
      <button style={{ ...btnSt("var(--c-key)","var(--c-bg)"), marginTop:18 }} onClick={save}>Save settings</button>
    </Modal>
  );
}

// ── Settings: user management + brand catalog ───────────────────────────────
function SettingsTab({ profile, users, catalog, notify }) {
  const brands = (catalog && catalog.brands) || [];
  const [newBrand, setNewBrand] = useState("");
  async function saveBrands(list) {
    try { await db.doc("config/catalog").set({ brands: list }); notify("Catalog saved.", "ok"); }
    catch (e) { notify("SERVER REFUSED:\n" + e.message, "error"); }
  }
  return (
    <div>
      <CreateUser brands={brands} notify={notify} />
      <div style={cardSt}>
        <div style={{ fontSize:12, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", marginBottom:10 }}>👥 Users ({users.length})</div>
        {users.map(u => <UserRow key={u.id} u={u} brands={brands} notify={notify} me={profile} />)}
      </div>
      <div style={cardSt}>
        <div style={{ fontSize:12, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", marginBottom:10 }}>🏷 Brand Catalog</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
          {brands.map(b=>(
            <span key={b} style={{ fontSize:12, padding:"4px 10px", borderRadius:999, background:"var(--c-card2)", border:"1px solid var(--c-border)", display:"inline-flex", gap:6, alignItems:"center" }}>
              {b}<button onClick={()=>saveBrands(brands.filter(x=>x!==b))} style={{ background:"none", border:"none", color:"#f87171", cursor:"pointer", padding:0 }}>✕</button>
            </span>
          ))}
          {brands.length === 0 && <span style={{ fontSize:12, color:"var(--c-text4)" }}>No brands yet — add the brands you carry; they drive the inventory dropdowns and the per-brand permission checkboxes.</span>}
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <input style={{ ...inputSt(), maxWidth:220 }} value={newBrand} onChange={e=>setNewBrand(e.target.value)} placeholder="e.g. Sebia" />
          <button style={btnSt("var(--c-key)","var(--c-bg)")} disabled={!newBrand.trim() || brands.includes(newBrand.trim())} onClick={()=>{ saveBrands([...brands, newBrand.trim()].sort()); setNewBrand(""); }}>+ Add brand</button>
        </div>
      </div>
    </div>
  );
}
function PermEditor({ perms, setPerms, brands }) {
  const set = (path, v) => setPerms(p => {
    const n = JSON.parse(JSON.stringify(p)); let o = n;
    for (let i = 0; i < path.length - 1; i++) o = o[path[i]];
    o[path[path.length-1]] = v; return n;
  });
  const sub = (id, label) => {
    const sp = perms.inventory.subs[id];
    const allOn = sp.brands === null || sp.brands === undefined;
    return (
      <div key={id} style={{ marginLeft:18, marginTop:6 }}>
        <label style={{ fontSize:12, display:"inline-flex", gap:5, cursor:"pointer" }}>
          <input type="checkbox" checked={!!sp.edit} onChange={e=>set(["inventory","subs",id,"edit"], e.target.checked)} /> Can edit {label}
        </label>
        {sp.edit && (
          <div style={{ marginLeft:20, marginTop:4 }}>
            <label style={{ fontSize:11.5, display:"inline-flex", gap:5, cursor:"pointer", color:"var(--c-text3)" }}>
              <input type="checkbox" checked={allOn} onChange={e=>set(["inventory","subs",id,"brands"], e.target.checked ? null : [])} /> All brands
            </label>
            {!allOn && (
              <div style={{ display:"flex", gap:"3px 12px", flexWrap:"wrap", marginTop:4 }}>
                {brands.map(b=>(
                  <label key={b} style={{ fontSize:11.5, display:"inline-flex", gap:4, cursor:"pointer", color:"var(--c-text2)" }}>
                    <input type="checkbox" checked={(sp.brands||[]).includes(b)} onChange={e=>{
                      const cur = sp.brands || [];
                      set(["inventory","subs",id,"brands"], e.target.checked ? [...cur, b] : cur.filter(x=>x!==b));
                    }} /> {b}
                  </label>
                ))}
                {(sp.brands||[]).length === 0 && <span style={{ fontSize:10, color:"#fbbf24" }}>⚠ no brands selected — can't edit any record</span>}
              </div>
            )}
          </div>
        )}
      </div>
    );
  };
  return (
    <div style={{ background:"var(--c-card2)", borderRadius:10, padding:12, border:"1px solid var(--c-border)" }}>
      {[["dashboard","Dashboard"],["labs","Institutions"],["inventory","Inventory"],["overtime","Overtime"]].map(([id,label])=>(
        <div key={id} style={{ marginBottom:6 }}>
          <label style={{ fontSize:12.5, display:"inline-flex", gap:6, cursor:"pointer", fontWeight:700 }}>
            <input type="checkbox" checked={!!perms[id].view} onChange={e=>set([id,"view"], e.target.checked)} /> {label} — view
          </label>{" "}
          {(id==="labs"||id==="inventory"||id==="overtime") && (
            <label style={{ fontSize:12, display:"inline-flex", gap:5, cursor:"pointer", marginLeft:10, color:"var(--c-text3)" }}>
              <input type="checkbox" disabled={!perms[id].view} checked={!!perms[id].edit} onChange={e=>set([id,"edit"], e.target.checked)} /> edit
            </label>
          )}
          {id === "inventory" && perms.inventory.view && perms.inventory.edit && (
            <React.Fragment>{sub("machines","Machine Inventory")}{sub("spares","Spare Parts")}</React.Fragment>
          )}
        </div>
      ))}
    </div>
  );
}
function CreateUser({ brands, notify }) {
  const [email, setEmail] = useState(""); const [pw, setPw] = useState("");
  const [name, setName] = useState(""); const [role, setRole] = useState("FSE");
  const [engineerName, setEngineerName] = useState("");
  const [perms, setPerms] = useState(blankPermissions());
  const [busy, setBusy] = useState(false);
  async function create() {
    if (!email.trim() || pw.length < 6) { notify("Enter an email and a password of at least 6 characters.", "error"); return; }
    setBusy(true);
    let secondary;
    try {
      secondary = firebase.initializeApp(firebaseConfig, "creator_" + Date.now());
      const cred = await secondary.auth().createUserWithEmailAndPassword(email.trim(), pw);
      const newUid = cred.user.uid;
      await secondary.auth().signOut();
      await db.collection("users").doc(newUid).set({
        email: email.trim(), displayName: name.trim(), isAdmin: false, role,
        engineerName: engineerName.trim(), permissions: perms, createdAt: FieldValue.serverTimestamp(),
      });
      notify("Created " + email.trim() + ".", "ok");
      setEmail(""); setPw(""); setName(""); setEngineerName(""); setPerms(blankPermissions());
    } catch (e) { notify(e.message, "error"); }
    finally { if (secondary) await secondary.delete(); setBusy(false); }
  }
  return (
    <div style={cardSt}>
      <div style={{ fontSize:12, fontWeight:800, color:"var(--c-text4)", textTransform:"uppercase", marginBottom:10 }}>➕ Create a user</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:10, marginBottom:10 }}>
        <div><label style={labelSt}>Email</label><input style={inputSt()} value={email} onChange={e=>setEmail(e.target.value)} /></div>
        <div><label style={labelSt}>Temp password</label><input style={inputSt()} value={pw} onChange={e=>setPw(e.target.value)} placeholder="≥ 6 chars" /></div>
        <div><label style={labelSt}>Full name</label><input style={inputSt()} value={name} onChange={e=>setName(e.target.value)} /></div>
        <div><label style={labelSt}>Role</label><select style={inputSt()} value={role} onChange={e=>setRole(e.target.value)}>{ENGINEER_ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
        <div><label style={labelSt}>Linked employee name</label><input style={inputSt()} value={engineerName} onChange={e=>setEngineerName(e.target.value)} placeholder="matches visit logs" /></div>
      </div>
      <PermEditor perms={perms} setPerms={setPerms} brands={brands} />
      <button style={{ ...btnSt("var(--c-key)","var(--c-bg)"), marginTop:12 }} disabled={busy} onClick={create}>{busy ? "Creating…" : "Create user"}</button>
      <div style={{ fontSize:10.5, color:"var(--c-text5)", marginTop:8 }}>Permissions are enforced by the server's Security Rules — HR / Accounting roles are the Overtime managers.</div>
    </div>
  );
}
function UserRow({ u, brands, notify, me }) {
  const [open, setOpen] = useState(false);
  const [perms, setPerms] = useState(u.permissions || blankPermissions());
  useEffect(() => { setPerms(u.permissions || blankPermissions()); }, [u.id]);
  async function save() {
    try { await db.collection("users").doc(u.id).update({ permissions: perms }); notify("Permissions updated for " + u.email + ".", "ok"); setOpen(false); }
    catch (e) { notify("SERVER REFUSED:\n" + e.message, "error"); }
  }
  return (
    <div style={{ borderBottom:"1px solid var(--c-border2)", padding:"8px 0" }}>
      <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
        <span style={{ fontWeight:700, minWidth:200 }}>{u.email}</span>
        <span style={{ fontSize:12, color:"var(--c-text3)" }}>{u.displayName || "—"}</span>
        <span style={{ fontSize:12, color:"var(--c-text4)" }}>{u.role || "—"}{u.engineerName ? " · 🔗 " + u.engineerName : ""}</span>
        {u.isAdmin && <span style={{ fontSize:10, fontWeight:800, padding:"2px 9px", borderRadius:999, color:"#fbbf24", border:"1px solid #fbbf2455" }}>ADMIN</span>}
        {!u.isAdmin && <button style={{ ...btnSt("var(--c-border)","var(--c-text2)"), padding:"4px 10px", fontSize:11, marginLeft:"auto" }} onClick={()=>setOpen(o=>!o)}>{open?"Close":"🔐 Access"}</button>}
      </div>
      {open && !u.isAdmin && (
        <div style={{ marginTop:8 }}>
          <PermEditor perms={perms} setPerms={setPerms} brands={brands} />
          <button style={{ ...btnSt("var(--c-key)","var(--c-bg)"), marginTop:8, padding:"6px 12px", fontSize:12 }} onClick={save}>Save access</button>
        </div>
      )}
    </div>
  );
}

// ── App shell ────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(undefined);
  const [profile, setProfile] = useState(undefined);
  const [toast, setToast] = useState(null);
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem("ibase_theme") || "dark"; } catch(e){ return "dark"; } });
  const notify = (msg, kind) => setToast({ msg, kind });
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); try { localStorage.setItem("ibase_theme", theme); } catch(e){} }, [theme]);
  useEffect(() => auth.onAuthStateChanged(setUser), []);
  useEffect(() => {
    if (!user) { setProfile(user === null ? null : undefined); return; }
    const unsub = db.collection("users").doc(user.uid).onSnapshot(
      d => setProfile(d.exists ? { id:d.id, ...d.data() } : null), () => setProfile(null));
    return () => unsub();
  }, [user]);

  // Live presence: viewer count, unique colors, name toggle, remote cursors.
  const presence = usePresence(user || null, profile || null);
  // Feed remote pointers (positions + colors) to the cosmic canvas via a ref
  // (per-frame read, no React re-render churn).
  const remotePointersRef = useRef([]);
  useEffect(() => {
    remotePointersRef.current = Object.keys(presence.cursors)
      .filter(id => id !== SESSION_ID && presence.viewers[id])
      .map(id => ({ x: presence.cursors[id].x, y: presence.cursors[id].y, color: (presence.viewers[id] || {}).color }));
  }, [presence.cursors, presence.viewers]);

  const signedProfile = profile ? { ...profile, isAdmin: !!profile.isAdmin } : null;
  const labs = useCol("labs", !!signedProfile && (pCanTab(signedProfile,"labs","view") || pCanTab(signedProfile,"overtime","view") || pCanTab(signedProfile,"dashboard","view")), notify);
  const users = useCol("users", !!signedProfile && signedProfile.isAdmin, notify);
  const catalog = useDoc("config/catalog", !!signedProfile);

  const TABS = signedProfile ? [
    pCanTab(signedProfile,"dashboard","view") && { id:"dashboard", label:"📊 Dashboard" },
    pCanTab(signedProfile,"labs","view") && { id:"labs", label:"🏥 Institutions" },
    pCanTab(signedProfile,"inventory","view") && { id:"inventory", label:"📦 Inventory" },
    pCanTab(signedProfile,"overtime","view") && { id:"overtime", label:"🕒 Overtime" },
    signedProfile.isAdmin && { id:"settings", label:"⚙ Settings" },
  ].filter(Boolean) : [];
  const [tab, setTab] = useState("dashboard");
  useEffect(() => { if (TABS.length && !TABS.find(t=>t.id===tab)) setTab(TABS[0].id); }, [TABS.map(t=>t.id).join("|")]);

  if (user === undefined) return <div style={{ padding:40, color:"var(--c-text4)" }}>Loading…</div>;
  if (user === null) return (
    <React.Fragment>
      <Login notify={notify} theme={theme} setTheme={setTheme} presence={presence} remotePointersRef={remotePointersRef} />
      <LiveCursors viewers={presence.viewers} cursors={presence.cursors} />
      {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
    </React.Fragment>
  );

  return (
    <React.Fragment>
      <div style={{ borderBottom:"1px solid var(--c-border)", background:"var(--c-bg2)" }}>
        <div style={{ maxWidth:1240, margin:"0 auto", padding:"12px 18px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:17, fontWeight:900 }}>iBase</div>
            <div style={{ fontSize:9.5, color:"var(--c-text4)", textTransform:"uppercase", letterSpacing:1.5 }}>Installed Base · {signedProfile && signedProfile.isAdmin ? "Administrator" : (signedProfile && signedProfile.role) || "Field User"}</div>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{ ...btnSt(tab===t.id?"var(--c-key)":"transparent", tab===t.id?"var(--c-bg)":"var(--c-text2)"), border: tab===t.id?"none":"1px solid var(--c-border)", padding:"7px 12px", fontSize:12.5 }}>{t.label}</button>
            ))}
          </div>
          <div style={{ marginLeft:"auto", display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <ViewersPill presence={presence} />
            <NameToggle presence={presence} />
            <HeaderClock />
            <ThemePicker theme={theme} setTheme={setTheme} />
            <span style={{ fontSize:12, color:"var(--c-text4)" }}>{user.email}</span>
            <button style={btnSt("var(--c-border)","var(--c-text2)")} onClick={()=>auth.signOut()}>🚪 Logout</button>
          </div>
        </div>
      </div>
      <div style={{ maxWidth:1240, margin:"0 auto", padding:18 }}>
        {profile === undefined && <div style={{ color:"var(--c-text4)" }}>Loading your profile…</div>}
        {profile === null && (
          <div style={cardSt}>
            <div style={{ fontWeight:800, marginBottom:8 }}>No profile yet</div>
            <div style={{ fontSize:13, color:"var(--c-text3)", lineHeight:1.6 }}>
              You're signed in, but there's no profile document for your account, so the server grants you nothing.
              If you're the first administrator, create it once in the Firestore console: collection <b>users</b>, document ID = <b>{user.uid}</b>, fields <b>isAdmin</b> (boolean true), <b>email</b>, <b>displayName</b>.
            </div>
          </div>
        )}
        {signedProfile && (
          <React.Fragment>
            {tab === "dashboard" && pCanTab(signedProfile,"dashboard","view") && <DashboardTab labs={labs} />}
            {tab === "labs" && pCanTab(signedProfile,"labs","view") && <LabsTab labs={labs} profile={signedProfile} notify={notify} />}
            {tab === "inventory" && pCanTab(signedProfile,"inventory","view") && <InventoryTab profile={signedProfile} labs={labs} catalog={catalog} notify={notify} />}
            {tab === "overtime" && pCanTab(signedProfile,"overtime","view") && <OvertimeTab profile={signedProfile} labs={labs} users={signedProfile.isAdmin ? users : []} notify={notify} />}
            {tab === "settings" && signedProfile.isAdmin && <SettingsTab profile={signedProfile} users={users} catalog={catalog} notify={notify} />}
          </React.Fragment>
        )}
      </div>
      <div style={{ textAlign:"center", padding:"10px 0 26px", fontSize:10, color:"var(--c-author)", letterSpacing:2, textTransform:"uppercase" }}>Designed & Developed by Rex Banihit</div>
      <LiveCursors viewers={presence.viewers} cursors={presence.cursors} />
      {toast && <Toast {...toast} onClose={()=>setToast(null)} />}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
