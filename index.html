<script>
/* iBase computation engines — extracted VERBATIM from iBase v126/v127 (incl. PM schedule engine) */
const OT_MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function otHoursBetween(a, b) { return Math.max(0, (b.getTime() - a.getTime()) / 3600000); }

function otParseDT(s) {
  if (!s) return null;
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function otRound2(n) { return Math.round((n + Number.EPSILON) * 100) / 100; }

const DEFAULT_OT_SCHEDULE = {
  mon: { off: false, start: "08:00", end: "17:30" },
  tue: { off: false, start: "08:00", end: "17:30" },
  wed: { off: false, start: "08:00", end: "17:30" },
  thu: { off: false, start: "08:00", end: "17:30" },
  fri: { off: false, start: "08:00", end: "17:30" },
  sat: { off: false, start: "08:00", end: "12:00" },
  sun: { off: true,  start: "08:00", end: "12:00" },
};

const OT_DAY_LABELS = { mon: "Monday", tue: "Tuesday", wed: "Wednesday", thu: "Thursday", fri: "Friday", sat: "Saturday", sun: "Sunday" };

const DEFAULT_OT_SETTINGS = { schedule: DEFAULT_OT_SCHEDULE, graceMinutes: 60, cutoff1: 10, cutoff2: 25 };

var PULLOUT_VISIT_STATUSES = ["pulled-out", "pulled out", "instrument is ready for pull-out", "scrapped", "decommissioned"];

const OT_DAY_KEYS = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];   // getUTCDay() order


const NON_ANALYTICS_VISIT_TYPES = ["travel", "office repair", "documentation", "pro-active visit", "site survey", "phone support", "offset", "vacation leave", "sick leave", "weekly visit", "emergency leave", "not applicable"];

const PH_HOLIDAYS_2026 = [
  { date: "2026-01-01", name: "New Year's Day",            type: "Regular Holiday" },
  { date: "2026-02-17", name: "Chinese New Year",          type: "Special Non-Working Holiday" },
  { date: "2026-04-02", name: "Maundy Thursday",           type: "Regular Holiday" },
  { date: "2026-04-03", name: "Good Friday",               type: "Regular Holiday" },
  { date: "2026-04-04", name: "Black Saturday",            type: "Special Non-Working Holiday" },
  { date: "2026-04-09", name: "Araw ng Kagitingan",        type: "Regular Holiday" },
  { date: "2026-05-01", name: "Labor Day",                 type: "Regular Holiday" },
  { date: "2026-06-12", name: "Independence Day",          type: "Regular Holiday" },
  { date: "2026-08-21", name: "Ninoy Aquino Day",          type: "Special Non-Working Holiday" },
  { date: "2026-08-31", name: "National Heroes Day",       type: "Regular Holiday" },
  { date: "2026-11-01", name: "All Saints' Day",           type: "Special Non-Working Holiday" },
  { date: "2026-11-30", name: "Bonifacio Day",             type: "Regular Holiday" },
  { date: "2026-12-08", name: "Feast of the Immaculate Conception", type: "Special Non-Working Holiday" },
  { date: "2026-12-25", name: "Christmas Day",             type: "Regular Holiday" },
  { date: "2026-12-30", name: "Rizal Day",                 type: "Regular Holiday" },
  { date: "2026-12-31", name: "Last Day of the Year",      type: "Special Non-Working Holiday" },
];

const HOLIDAY_TYPES = ["Regular Holiday", "Special Non-Working Holiday", "Special Working Holiday", "Company Holiday"];

const ENGINEER_ROLES = [
  "Field Service Engineer",
  "Senior Field Service Engineer",
  "Application Specialist",
  "Senior Application Specialist",
  "CAS Supervisor",
  "TAS Coordinator",
  "Area Service Manager",
  "Technical Head",
  "Supervisor",
  "Trainee",
  "HR",
  "Accounting",
  "Warehouse Staff",
  "Driver",
  "Office Staff",
];

const INVENTORY_STATUS_OPTIONS = ["Available", "Not available", "Reserved", "For Installation", "Sold"];

function otNormSchedule(settings) {
  var src = (settings && settings.schedule && typeof settings.schedule === "object") ? settings.schedule : null;
  var legacyStart = (settings && settings.officeStart) || "08:00";
  var legacyEnd   = (settings && settings.officeEnd)   || "17:30";
  var out = {};
  OT_DAY_KEYS.forEach(function (k) {
    var d = (src && src[k]) || null;
    var def = DEFAULT_OT_SCHEDULE[k];
    if (d) out[k] = { off: !!d.off, start: d.start || def.start, end: d.end || def.end };
    else if (src) out[k] = { off: def.off, start: def.start, end: def.end };
    else out[k] = (k === "sat" || k === "sun") ? { off: def.off, start: def.start, end: def.end }
                                               : { off: false, start: legacyStart, end: legacyEnd };
  });
  var grace = Number(settings && settings.graceMinutes);
  if (!isFinite(grace) || grace < 0) grace = 60;
  return { schedule: out, graceMinutes: Math.min(600, Math.round(grace)) };
}

function otNormCutoffs(settings) {
  var c1 = Math.min(27, Math.max(1, Number(settings && settings.cutoff1) || 10));
  var c2 = Math.min(28, Math.max(c1 + 1, Number(settings && settings.cutoff2) || 25));
  return { c1: c1, c2: c2 };
}

function otWeekday(dateKey) {
  var p = String(dateKey).split("-").map(Number);
  return new Date(Date.UTC(p[0], p[1] - 1, p[2])).getUTCDay();
}

function otCutoffForDate(dateKey, settings) {
  var cc = otNormCutoffs(settings), c1 = cc.c1, c2 = cc.c2;
  var parts = String(dateKey).split("-").map(Number);
  var y = parts[0], m = parts[1] - 1, day = parts[2];
  function shortMon(mm) { return OT_MONTH_NAMES[mm].slice(0, 3); }
  var endY, endM, endD, startY, startM, startD, half;
  if (day <= c1)      { endY = y; endM = m; endD = c1; half = "A"; startY = y; startM = m - 1; if (startM < 0) { startM = 11; startY = y - 1; } startD = c2 + 1; }
  else if (day <= c2) { endY = y; endM = m; endD = c2; half = "B"; startY = y; startM = m; startD = c1 + 1; }
  else                { endY = y; endM = m + 1; if (endM > 11) { endM = 0; endY = y + 1; } endD = c1; half = "A"; startY = y; startM = m; startD = c2 + 1; }
  var startDMax = new Date(startY, startM + 1, 0).getDate();
  if (startD > startDMax) startD = startDMax;
  return {
    key: endY + "-" + String(endM + 1).padStart(2, "0") + "-" + half,
    label: shortMon(startM) + " " + startD + " – " + shortMon(endM) + " " + endD + ", " + endY,
    order: endY * 1000 + endM * 10 + (half === "A" ? 1 : 2),
  };
}

function otAddDays(dateKey, n) {
  var p = String(dateKey).split("-").map(Number);
  var dt = new Date(Date.UTC(p[0], p[1] - 1, p[2] + n));
  return dt.toISOString().slice(0, 10);
}

function computeEngineerOt(engineerName, allVisits, otSettings, holidayMap) {
  var settings = otSettings || DEFAULT_OT_SETTINGS;
  var byDate = {};
  var incompleteCount = 0;
  (allVisits || []).forEach(function (v) {
    var involved = v.engineer === engineerName || v.engineer2 === engineerName || v.engineer3 === engineerName;
    if (!involved) return;
    var start = otParseDT(v.dtDeparture) || otParseDT(v.dtWorkStarted);
    var end   = otParseDT(v.dtArrivalHome) || otParseDT(v.dtWorkEnded);
    if (!start || !end || end.getTime() <= start.getTime()) { if (v.date) incompleteCount++; return; }
    var dateKey = v.date || start.toISOString().slice(0, 10);
    if (!byDate[dateKey]) byDate[dateKey] = { starts: [], ends: [], visitIds: [], isrNos: [] };
    byDate[dateKey].starts.push(start);
    byDate[dateKey].ends.push(end);
    byDate[dateKey].visitIds.push(v.id);
    if (v.isrNo) byDate[dateKey].isrNos.push(v.isrNo);
  });
  var days = Object.keys(byDate).sort().map(function (dateKey) {
    var rec = byDate[dateKey];
    var dayStart = new Date(Math.min.apply(null, rec.starts.map(function (d) { return d.getTime(); })));
    var dayEnd   = new Date(Math.max.apply(null, rec.ends.map(function (d) { return d.getTime(); })));
    var totalHours = otHoursBetween(dayStart, dayEnd);
    var holidayName = holidayMap && holidayMap[dateKey] ? holidayMap[dateKey] : "";
    var isHoliday = !!holidayName;
    var norm = otNormSchedule(settings);
    var sch = norm.schedule[OT_DAY_KEYS[otWeekday(dateKey)]];
    var isRestDay = !!(sch && sch.off);
    var regularHours, otHours;
    if (isHoliday || isRestDay) {
      // Holiday or scheduled rest day (e.g. Sunday): the whole worked span is OT.
      regularHours = 0; otHours = totalHours;
    } else {
      var offStart = new Date(dateKey + "T" + (sch.start || "08:00") + ":00");
      var offEnd   = new Date(dateKey + "T" + (sch.end   || "17:30") + ":00");
      var overlapStartMs = Math.max(dayStart.getTime(), offStart.getTime());
      var overlapEndMs   = Math.min(dayEnd.getTime(), offEnd.getTime());
      regularHours = overlapEndMs > overlapStartMs ? (overlapEndMs - overlapStartMs) / 3600000 : 0;
      // Grace rule: the first graceMinutes after office end are NOT yet overtime
      // (e.g. 17:30–18:30). Morning OT (before office start) has no grace.
      var graceMs = norm.graceMinutes * 60000;
      var morningOtMs = Math.max(0, Math.min(dayEnd.getTime(), offStart.getTime()) - dayStart.getTime());
      var eveningOtMs = Math.max(0, dayEnd.getTime() - Math.max(dayStart.getTime(), offEnd.getTime() + graceMs));
      otHours = (morningOtMs + eveningOtMs) / 3600000;
    }
    return {
      date: dateKey, totalHours: otRound2(totalHours), regularHours: otRound2(regularHours), otHours: otRound2(otHours),
      isHoliday: isHoliday, holidayName: holidayName, restDay: isRestDay, visitCount: rec.visitIds.length, isrNos: rec.isrNos,
      dayStart: dayStart, dayEnd: dayEnd,
    };
  });
  return { days: days, incompleteCount: incompleteCount };
}

function isOtManagerRoleName(role) {
  var r = String(role || "").trim().toLowerCase();
  if (!r) return false;
  return r === "hr" || r.indexOf("human resource") !== -1 || r.indexOf("accounting") !== -1 || r.indexOf("accountant") !== -1;
}

function invPlacement(labs, serial) {
  var sn = String(serial || "").trim().toLowerCase();
  if (!sn) return { state: "In Warehouse", lab: "", returnedSuggested: "" };
  var installed = null, installedKey = "", returned = null, returnedKey = "";
  function _later(a, b) { a = String(a || ""); b = String(b || ""); if (a && !b) return true; if (!a && b) return false; return a >= b; }
  (labs || []).forEach(function (lab) {
    (lab.machines || []).forEach(function (m) {
      if (String(m.serialNo || "").trim().toLowerCase() !== sn) return;
      if (isMachineReleased(m)) {
        var k = invLastOutDate(m) || m.installDate || "";   // when it most recently left this lab
        if (returned == null || _later(k, returnedKey)) { returned = lab.name || ""; returnedKey = k; }
      } else {
        var ik = m.installDate || "";
        if (installed == null || _later(ik, installedKey)) { installed = lab.name || ""; installedKey = ik; }
      }
    });
  });
  if (installed != null) return { state: "Installed", lab: installed, returnedSuggested: "" };
  if (returned != null) {
    var po = latestPullOut(labs, serial);
    // Auto returned-date only when the unit was actually "Pulled-out"; for
    // "Instrument is ready for pull-out" the returned date stays a manual entry.
    var sugg = (po && po.mode === "pulled") ? (po.date || "") : "";
    return { state: "Returned", lab: returned, returnedSuggested: sugg };
  }
  return { state: "In Warehouse", lab: "", returnedSuggested: "" };
}

function invEffectiveStatus(storedStatus, placementState) {
  if (placementState === "Installed") return "Onsite";
  var st = String(storedStatus || "").trim();
  if (!st || st === "Onsite" || st === "Available") return "Available";
  return st;
}

function _normLabName(name) { return String(name || "").trim().replace(/\s+/g, " ").toLowerCase(); }

function invDistinctInstallLabs(labs, serial) {
  var sn = String(serial || "").trim().toLowerCase();
  if (!sn) return [];
  var set = {};
